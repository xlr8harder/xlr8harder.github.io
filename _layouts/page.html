---
layout: default
---
<article class="post">
  <div class="post-content">
    {{ content }}
  </div>
</article>
<script>
  document.querySelectorAll('.post-content h1[id], .post-content h2[id], .post-content h3[id], .post-content h4[id]').forEach(function (h) {
    var a = document.createElement('a');
    a.className = 'self-anchor';
    a.href = '#' + h.id;
    while (h.firstChild) a.appendChild(h.firstChild);
    h.appendChild(a);
  });
</script>
